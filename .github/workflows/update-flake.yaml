# Runs weekly (Friday 10:00 UTC) and on manual dispatch.
# Updates flake.lock to the latest revisions of all inputs and commits the result.
name: Update flake lock

on:
  schedule:
    - cron: "0 10 * * 5"
  workflow_dispatch:

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Install Nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1

      - name: Update flake inputs
        run: nix flake update

      - name: Commit updated flake.lock
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore: Updated deps"
          commit_user_name: Flake Bot Update
          commit_author: Flake Bot Update <actions@github.com>
          branch: main
          skip_dirty_check: false
          skip_fetch: true
