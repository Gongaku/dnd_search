name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump pyproject.toml version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Need push access to commit back the version bump
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VERSION="${TAG#v}"                # strip leading 'v'
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml if needed
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pyproject.toml
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME#refs/tags/} || true
          fi

  build:
    name: Build binary (${{ matrix.os }})
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dnd-search-linux
            binary: dnd-search-linux
          - os: macos-latest
            artifact: dnd-search-macos
            binary: dnd-search-macos
          - os: windows-latest
            artifact: dnd-search-windows
            binary: dnd-search.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.artifact }} --hidden-import lxml.etree --hidden-import lxml._elementpath --hidden-import bs4 main.py --distpath .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/dnd-search-linux/dnd-search-linux
            dist/dnd-search-macos/dnd-search-macos
            dist/dnd-search-windows/dnd-search.exe
